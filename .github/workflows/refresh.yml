name: Refresh stats

on:
  schedule:
    - cron: '0 */6 * * *'   # every 6h (00:00, 06:00, 12:00, 18:00 UTC) — fits Actions free tier on private repos
  workflow_dispatch:

permissions:
  contents: write

# Don't let two refresh runs (e.g. a manual dispatch overlapping the cron) race
# on pushing to main. Queue the newer run instead of running them concurrently.
concurrency:
  group: refresh-stats
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci --legacy-peer-deps

      - name: Fetch stats
        env:
          GITHUB_TOKEN: ${{ secrets.STATS_PAT }}
          GITHUB_ORG: rimo
        run: npm run fetch-stats

      - name: Commit refreshed data
        run: |
          if [[ -z "$(git status --porcelain public/data/)" ]]; then
            echo "No changes to commit"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/data/
          git commit -m "chore(data): refresh stats $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          # Retry a few times: if another run pushed to main first, rebase our
          # data commit on top and try again rather than failing the whole run.
          for attempt in 1 2 3; do
            if git push; then
              exit 0
            fi
            echo "push rejected (attempt $attempt), rebasing on latest main..."
            git pull --rebase origin main
          done
          echo "push failed after 3 attempts" >&2
          exit 1
